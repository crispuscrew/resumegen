name: CI

on:
  pull_request:
    branches: [dev, workflow, main]
  push:
    branches: [dev, workflow, main]

permissions:
  contents: read

jobs:
  test:
    name: Test + coverage gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Coverage gate
        env:
          GATE: 50
        run: sh scripts/coverage-gate.sh

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
