# Job-level tags: if non-empty, the position is skipped entirely when none of its
# tags match the active profile. If empty, visibility is determined by bullets alone.
#
# Bullet tags: at least one must match an active profile tag for the bullet to appear.
# A job with zero visible bullets is always omitted.
#
# Strings may contain Typst inline markup (*bold*, _italic_, #link(...)[...]).
# They are written into data_gen.typ as content blocks: [string].

[[jobs]]

    [jobs.title]
    en = "Software Engineer"
    ru = "Программист-разработчик"

    [jobs.date]
    en = "Jan. 2025 – Present"
    ru = "Янв. 2025 – н.в."

    company = "LLC Gumich RTK"

    [jobs.location]
    en = "Moscow, Russia"
    ru = "Москва, Россия"

    [[jobs.bullets]]
    en   = "Refactored and extended a 2M+ LOC *Qt/QML* ground control station for robotic systems: custom QML screens and C++ integrations in a 7-person team"
    ru   = "Рефакторил и расширял *Qt/QML*-комплекс управления робототехническими комплексами (2M+ строк): QML-экраны и C++-интеграции в команде из 7 человек"
    [jobs.bullets.tags]
    tags = ["cpp", "refactoring", "gui", "qt", "robotics"]

    [[jobs.bullets]]
    en   = "Regularly deputized for the team lead, managing delivery planning and task distribution across the team"
    ru   = "Регулярно исполнял обязанности тимлида: планировал поставки и распределял задачи по команде"
    [jobs.bullets.tags]
    tags = ["mgmt"]

    [[jobs.bullets]]
    en   = "Designed and implemented an internal *artifact storage service* in Go: REST API, Redis for metadata, Docker volume as file store, consumed by a React frontend — replaced manual binary distribution"
    ru   = "Разработал внутренний *сервис хранения артефактов* на Go: REST API, Redis, Docker-том, React-фронтенд — заменил ручную дистрибуцию бинарей"
    [jobs.bullets.tags]
    tags = ["go", "devops"]

    [[jobs.bullets]]
    en   = "Developed a USB-over-IP relay on *Orange Pi* (ARM Linux) for the SDR subsystem, achieving *80 MB/s* sustained I/Q throughput"
    ru   = "Разработал USB-over-IP ретранслятор на *Orange Pi* (ARM Linux) для SDR-подсистемы с устойчивой пропускной способностью *80 МБ/с* по I/Q"
    [jobs.bullets.tags]
    tags = ["embedded-linux", "devops", "robotics"]


