    [[projects.bullets]]
    tags = ["devops"]
    [projects.bullets.text]
    en = "Multi-distro support (Debian, RedHat, Arch, Alpine) - from bare VPS to running VPN in a single command"
    ru = "Поддержка нескольких дистрибутивов (Debian, RedHat, Arch, Alpine) - от чистого VPS до работающего VPN одной командой"
