# Project entries use the same schema as jobs (title, date, subtitle, detail, bullets).
# date is typically empty for personal projects.
# subtitle: tech stack label (shown italic bottom-left). detail: any string shown bottom-right, typically a repo URL.
# Bullet tags and job-level tags work identically to jobs.toml.

[[projects]]
tags     = ["go"]
title    = "pgxray"
date     = ""
subtitle = "Go, TUI, PostgreSQL"
detail   = "github.com/crispuscrew/pgxray"

    [[projects.bullets]]
    tags = ["go"]
    [projects.bullets.text]
    en = "Keyboard-driven read-only TUI for exploring PostgreSQL, designed to run on the server and accessed over SSH - no port forwarding or local client setup"
    ru = "Клавиатурный read-only TUI для работы с PostgreSQL прямо на сервере: доступ через SSH без проброса портов и локальной настройки"

    [[projects.bullets]]
    tags = ["go"]
    [projects.bullets.text]
    en = "Component-based *Bubble Tea v2* architecture: schema browser and live table data viewer"
    ru = "Компонентная архитектура на *Bubble Tea v2*: браузер схем и просмотр данных таблиц"

    [[projects.bullets]]
    tags = ["go"]
    [projects.bullets.text]
    en = "All queries run in *REPEATABLE READ* read-only transactions - consistent snapshot with no risk of accidental mutation"
    ru = "Все запросы в *REPEATABLE READ* read-only транзакции - консистентный снимок без риска случайной мутации"


[[projects]]
tags     = ["devops"]
title    = "amnezia-ansible"
date     = ""
subtitle = "Ansible, DevOps"
detail   = "github.com/crispuscrew/amnezia-ansible"

